<!DOCTYPE html>
<!--
  쇼츠 공유 랜딩 페이지 (GitHub Pages)

  ?v=VIDEOID 로 열리면 설치된 앱에서 쇼츠를 재생한다.
  시도 순서: Flutter 앱(pbviewer) → 기존 네이티브 앱(pbshorts) → YouTube.
   - Flutter 앱 설치 시: pbviewer://watch 로 즉시 열림.
   - 미설치 시: intent 의 browser_fallback_url 이 같은 페이지를 ?s=native 로 다시 열어
     네이티브 앱(pbshorts)을 시도하고, 그것도 없으면 YouTube 로 이동.
  카카오톡 등 메신저 인앱 브라우저에서도 intent:// 방식이 가장 안정적.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>야구픽</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
           text-align: center; padding: 48px 20px; color: #2c2c36; background: #f5f3fb; }
    h2 { margin-bottom: 8px; }
    .btn { display: inline-block; margin-top: 14px; padding: 12px 22px; border-radius: 24px;
           text-decoration: none; font-weight: 700; }
    .app { background: #16264a; color: #fff; }
    .yt { background: #fff; color: #c30430; border: 1px solid #e3dff0; }
    .sub { color: #9a9aac; font-size: 13px; margin-top: 22px; line-height: 1.5; }
    .row { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  </style>
</head>
<body>
  <h2>⚾ 야구픽</h2>
  <p id="msg">앱에서 영상을 여는 중...</p>
  <div class="row">
    <a id="open" class="btn app" href="#">📱 앱에서 보기</a>
    <a id="yt" class="btn yt" href="#">▶ YouTube에서 보기</a>
  </div>
  <p class="sub">앱이 설치돼 있으면 앱에서, 없으면 YouTube로 열립니다.</p>
  <script>
    var params = new URLSearchParams(location.search);
    var v = (params.get('v') || '').trim();
    var stage = params.get('s') || 'flutter'; // flutter → native → (youtube)
    var isAndroid = /android/i.test(navigator.userAgent);
    var ytUrl = v ? 'https://youtu.be/' + encodeURIComponent(v) : 'https://m.youtube.com/';

    // intent:// URL 생성 (scheme/package 지정 + 미설치 시 fallback 으로 이동)
    function intentUrl(scheme, pkg, fallback) {
      return 'intent://watch?v=' + encodeURIComponent(v) +
        '#Intent;scheme=' + scheme + ';package=' + pkg + ';' +
        'S.browser_fallback_url=' + encodeURIComponent(fallback) + ';end';
    }
    var pageBase = location.origin + location.pathname;
    var flutterIntent = intentUrl('pbviewer', 'com.pbviewer.pbshorts_flutter',
      pageBase + '?v=' + encodeURIComponent(v) + '&s=native'); // 없으면 네이티브 단계로
    var nativeIntent = intentUrl('pbshorts', 'com.lgtwins.shorts', ytUrl); // 없으면 YouTube

    // 버튼(자동 실행이 막힌 경우 대비)
    document.getElementById('open').href =
      isAndroid ? flutterIntent : ('pbviewer://watch?v=' + encodeURIComponent(v));
    document.getElementById('yt').href = ytUrl;

    if (!v) {
      document.getElementById('msg').textContent = '잘못된 링크입니다.';
    } else if (!isAndroid) {
      // iOS/기타: 커스텀 스킴(Flutter) 시도 후 1.2초 내 전환 없으면 YouTube
      var t = setTimeout(function () { location.href = ytUrl; }, 1200);
      window.addEventListener('pagehide', function () { clearTimeout(t); });
      location.href = 'pbviewer://watch?v=' + encodeURIComponent(v);
    } else if (stage === 'native') {
      location.href = nativeIntent;   // 2단계: 네이티브 앱 시도
    } else {
      location.href = flutterIntent;  // 1단계: Flutter 앱 시도
    }
  </script>
</body>
</html>
